paths:
  # Comment Endpoints
  /api/comments/{postId}/comments:
    post:
      summary: Create comment
      tags: [Comments]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                rootId:
                  type: string
                immediateParent:
                  type: string
                replyToUserId:
                  type: string
      responses:
        '201':
          description: Comment created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  comment:
                    $ref: '#/components/schemas/Comment'
    
    get:
      summary: Get root comments
      tags: [Comments]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Root comments list
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
                  hasMore:
                    type: boolean

  /api/comments/{postId}/comments/{rootId}/thread:
    get:
      summary: Get thread replies
      tags: [Comments]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
        - in: path
          name: rootId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Thread replies
          content:
            application/json:
              schema:
                type: object
                properties:
                  replies:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
                  hasMore:
                    type: boolean

  /api/comments/comments/{id}:
    patch:
      summary: Edit comment
      tags: [Comments]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Comment updated successfully
    
    delete:
      summary: Soft delete comment
      tags: [Comments]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Comment deleted successfully

  /api/comments/comments/{id}/reactions:
    post:
      summary: React to comment
      tags: [Comments]
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reactionType]
              properties:
                reactionType:
                  type: string
                  enum: [like, love, haha, wow, sad, angry]
      responses:
        '200':
          description: Reaction added/updated
